<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rivalry Hub | Hudson & Connor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #141414; --accent-red: #E50914; --text-white: #fff; }
        body { margin: 0; background: var(--main-bg); color: var(--text-white); font-family: 'Roboto', sans-serif; overflow-x: hidden;}
        
        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index: 100; transition: 0.5s; }
        .nav-left { display: flex; align-items: center; }
        .logo { color: var(--accent-red); font-size: 1.8rem; font-weight: bold; text-decoration: none; margin-right: 25px; letter-spacing: 1px; }
        .nav-links { display: flex; list-style: none; gap: 20px; padding: 0; margin: 0; }
        .nav-links a { color: #e5e5e5; text-decoration: none; font-size: 0.9rem; font-weight: bold; }

        /* Search Bar Styling */
        .search-container { position: relative; display: flex; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid #555; padding: 5px 10px; border-radius: 4px; }
        #searchInput { background: transparent; border: none; color: white; outline: none; width: 150px; transition: width 0.4s; font-size: 0.85rem; }
        #searchInput:focus { width: 250px; }

        /* Hero */
        .hero { height: 60vh; background: linear-gradient(to top, var(--main-bg), transparent), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000') center/cover; display: flex; flex-direction: column; justify-content: center; padding: 0 4%; }
        .hero h1 { font-size: 4rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        /* Loader */
        #loader { display: block; margin: 50px auto; border: 5px solid #333; border-top: 5px solid var(--accent-red); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Rows */
        .row { padding: 20px 4%; transition: opacity 0.3s; }
        .row h2 { font-size: 1.5rem; color: #e5e5e5; margin-bottom: 5px; border-left: 4px solid var(--accent-red); padding-left: 10px; }
        .row-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px 0; scrollbar-width: none; min-height: 100px; align-items: flex-start; }
        .row-container::-webkit-scrollbar { display: none; }
        
        /* Cards */
        .card-wrapper { display: flex; flex-direction: column; opacity: 0; animation: fadeIn 0.8s forwards; flex-shrink: 0; }
        .video-card { min-width: 320px; height: 180px; background: #000; border-radius: 4px; transition: 0.4s; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .video-card.tiktok-card { min-width: 200px; height: 350px; }
        .video-card:hover { transform: scale(1.05); z-index: 10; }
        .video-card iframe, .video-card img { width: 100%; height: 100%; border: none; display: block; object-fit: cover; }
        .video-title { font-size: 0.85rem; margin-top: 8px; color: #fff; font-weight: 500; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @keyframes fadeIn { to { opacity: 1; } }
        
        /* Hide class for search */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="nav-left">
            <a href="#" class="logo">RIVALRY HUB</a>
            <div class="nav-links">
                <a href="#hudson">Hudson</a>
                <a href="#connor">Connor</a>
                <a href="#hudcon">HudCon</a>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search archive..." onkeyup="filterContent()">
        </div>
    </nav>

    <div class="hero">
        <h1>Storrie-Williams Archive</h1>
        <p>Give me your eyes I need sunshine❤️🌞</p>
    </div>

    <div id="loader"></div>

    <section class="row" id="hudson">
        <h2 class="category-title">Hudson Williams: Short Films</h2>
        <div class="row-container" id="hudson-short-films"></div>
        <h2 class="category-title">Hudson Williams: Interviews</h2>
        <div class="row-container" id="hudson-interviews"></div>
       
    </section>

    <section class="row" id="connor">
        <h2 class="category-title">Connor Storrie: Short Films</h2>
        <div class="row-container" id="connor-short-films"></div>
        <h2 class="category-title">Connor Storrie: Interviews</h2>
        <div class="row-container" id="connor-interviews"></div>
        
    </section>

    <section class="row" id="hudcon">
        <h2 class="category-title">HudCon: Joint YouTube Clips</h2>
        <div class="row-container" id="both-youtube"></div>
        
    </section>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWxheUIbo4UH1zY0r28bIMky5ndww1lueEhgEfkU8SG1JP3EYcqG_h_rUWmKblOiE9/exec";

        function cleanUrl(url) {
            if (url.includes('youtube.com/watch?v=')) return url.replace('watch?v=', 'embed/');
            if (url.includes('youtu.be/')) {
                const id = url.split('.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            if (url.includes('tiktok.com') && !url.includes('embed')) {
                const videoId = url.split('/video/')[1]?.split('?')[0];
                if (videoId) return `https://www.tiktok.com/embed/v2/${videoId}?refer=embed`;
            }
            return url;
        }

        function filterContent() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('card-wrapper');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.video-title').innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].classList.remove('hidden');
                } else {
                    cards[i].classList.add('hidden');
                }
            }
        }

        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                data.forEach(item => {
                    let rowId = "";
                    const url = item.url.toLowerCase();
                    const isTikTok = url.includes('tiktok.com');
                    const isImage = url.match(/\.(jpeg|jpg|gif|png|webp|avif)$/) != null || url.includes('imgur.com');
                    const actor = item.actor.toLowerCase();
                    const category = item.category.toLowerCase().replace(/\s+/g, '-');

                    if (actor === "both") {
                        if (isImage) rowId = "both-photos";
                        else rowId = isTikTok ? "both-edits" : "both-youtube";
                    } else {
                        if (isImage) rowId = `${actor}-photos`;
                        else rowId = isTikTok ? `${actor}-edits` : `${actor}-${category}`;
                    }

                    const container = document.getElementById(rowId);
                    if (container) {
                        const cardClass = isTikTok ? "video-card tiktok-card" : "video-card";
                        let mediaHTML = isImage 
                            ? `<img src="${item.url}" loading="lazy">`
                            : `<iframe src="${cleanUrl(item.url)}" loading="lazy" allowfullscreen scrolling="no"></iframe>`;

                        container.innerHTML += `
                            <div class="card-wrapper">
                                <div class="${cardClass}">
                                    ${mediaHTML}
                                </div>
                                <div class="video-title">${item.title}</div>
                            </div>
                        `;
                    }
                });
            });

        window.addEventListener('scroll', () => {
            document.getElementById('navbar').style.background = window.scrollY > 50 ? 'rgba(0,0,0,0.95)' : 'linear-gradient(to bottom, rgba(0,0,0,0.9), transparent)';
        });
    </script>
</body>

</html>
